<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#33033C">
  <title>Core Truth House OS — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; background: #0D0010;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-family: 'DM Sans', -apple-system, sans-serif; padding: 40px 24px; text-align: center;
    }
    .mark { width: 64px; height: 64px; border-radius: 18px; background: #33033C;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .mark span { color: #E04E35; font-weight: 800; font-size: 28px; }
    h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
    p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.65; max-width: 320px; margin-bottom: 28px; }
    button { padding: 11px 28px; background: #E04E35; color: #fff; border: none;
      border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; }
    button:hover { opacity: 0.9; }
    .features { display: flex; flex-direction: column; gap: 8px; margin-top: 32px; max-width: 300px; width: 100%; }
    .feature { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; text-align: left; }
    .feature-icon { font-size: 18px; flex-shrink: 0; }
    .feature-text { font-size: 12px; color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>
  <div class="mark"><span>C</span></div>
  <h1>You're offline</h1>
  <p>No internet connection detected. Some features are available from cache — others need a connection to work.</p>
  <button onclick="window.location.reload()">Try again</button>
  <div class="features">
    <div class="feature">
      <span class="feature-icon">&#10003;</span>
      <span class="feature-text">Brand Memory — readable offline</span>
    </div>
    <div class="feature">
      <span class="feature-icon">&#10003;</span>
      <span class="feature-text">Brand Foundation — readable offline</span>
    </div>
    <div class="feature">
      <span class="feature-icon">&#10003;</span>
      <span class="feature-text">Strategic OS steps — readable offline</span>
    </div>
    <div class="feature">
      <span class="feature-icon">&#9889;</span>
      <span class="feature-text">AI generation — requires connection</span>
    </div>
  </div>
</body>
</html>
