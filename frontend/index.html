            <h1>Core Truth House — AI-Powered Brand Operating System</h1>
            <h2>Build the brand behind the business before you build the brand the world sees</h2>
            <p>Core Truth House is an AI-powered brand operating system designed for coaches, consultants, and service providers who want to build premium brands with clarity and confidence. Create your strategy, systems, offers, identity, and content in one powerful platform.</p>
            <h2>Brand Foundation Builder</h2>
            <p>Define your brand's core truth, mission, vision, values, positioning, and voice in a guided, AI-assisted workflow. Your Brand Foundation becomes the single source of truth that powers every piece of content you create. No more guessing what your brand sounds like — every generation is informed by your Brand Memory.</p>
            <h2>Strategic OS with 9-Step Workflow</h2>
            <p>Walk through a structured nine-step brand strategy process that covers everything from market positioning to audience segmentation to offer architecture. Each step builds on the last, creating a comprehensive strategic framework that drives real business results. The Strategic OS turns brand strategy into a repeatable system.</p>
            <h2>AI Content Studio</h2>
            <p>Generate blog posts, social media captions, email newsletters, ad copy, sales pages, and more — all written in your brand voice. The Content Studio uses your Brand Memory to ensure every piece of content sounds authentically like you. Choose from multiple AI models including Claude and GPT to find the voice that fits best.</p>
            <h2>Identity Studio</h2>
            <p>Design your brand's visual identity with AI-powered tools. Define your color palette, typography system, logo usage guidelines, and visual direction. Export professional brand guidelines as a styled PDF with one click. The Identity Studio keeps your visual brand consistent across every touchpoint.</p>
            <h2>Media Studio with AI Image Generation</h2>
            <p>Create on-brand images using AI image generation powered by Nano Banana, DALL-E, and more. Add watermarks, search across providers, and maintain a media library that stays true to your brand's visual language. Every image generated is informed by your brand identity settings.</p>
            <h2>Campaign Builder with MAGNET Framework</h2>
            <p>Plan and execute marketing campaigns using the six-step MAGNET Framework: Mission, Audience, Gravity Message, Narrative Content System, Engagement Engine, and Transaction. Track results with target vs actual metrics, weekly breakdowns, and campaign verdicts. Push content plans directly to your calendar as scheduled drafts.</p>
            <h2>CRM and Client Management</h2>
            <p>Manage your clients, leads, and business relationships in one place. Track interactions, pipeline stages, and revenue. The CRM integrates with your campaigns and content to give you a complete picture of your brand's business performance and client journey.</p>
            <h2>Built for Serious Brand Builders</h2>
            <p>Core Truth House is not another Canva clone or social media scheduler. It is a brand operating system built for founders, coaches, consultants, and service providers who understand that a strong brand is the highest-leverage asset in their business. Start building free at coretruthhouse.com and see why serious brand builders choose Core Truth House OS.</p>
            <p>Features include: Brand Foundation Builder, Strategic OS with 9-step workflow, AI Content Studio, Identity Studio, Media Studio with AI image generation, Campaign Builder with MAGNET Framework, CRM, Blog CMS, Social Media Manager, Calendar, and Brand Guidelines PDF export.</p>
